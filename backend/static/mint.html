<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mint NFT | MLSA Cards</title>
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .mint-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2rem;
        margin-top: 2rem;
      }

      .mint-form {
        background: rgba(255, 255, 255, 0.05);
        padding: 2rem;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .form-group {
        margin-bottom: 1.5rem;
      }

      .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        color: #e2e8f0;
        font-weight: 600;
      }

      .form-group input,
      .form-group textarea {
        width: 100%;
        padding: 0.75rem;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        color: #e2e8f0;
        font-family: inherit;
        font-size: 1rem;
      }

      .form-group textarea {
        min-height: 100px;
        resize: vertical;
      }

      .form-group input:focus,
      .form-group textarea:focus {
        outline: none;
        border-color: #22d3ee;
      }

      .preview-card {
        background: rgba(255, 255, 255, 0.05);
        padding: 2rem;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        height: fit-content;
        position: sticky;
        top: 2rem;
      }

      .preview-card h3 {
        margin-top: 0;
        margin-bottom: 1.5rem;
        color: #e2e8f0;
      }

      .nft-preview {
        background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        padding: 1.5rem;
        border-radius: 8px;
        border: 2px solid rgba(34, 211, 238, 0.3);
      }

      .nft-preview img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        border-radius: 8px;
        margin-bottom: 1rem;
        background: rgba(0, 0, 0, 0.5);
      }

      .nft-preview h4 {
        margin: 0 0 0.5rem 0;
        color: #22d3ee;
        font-size: 1.25rem;
      }

      .nft-preview p {
        margin: 0;
        color: #94a3b8;
        font-size: 0.9rem;
        line-height: 1.5;
      }

      .mint-info {
        background: rgba(34, 211, 238, 0.1);
        padding: 1rem;
        border-radius: 8px;
        margin-bottom: 1.5rem;
        border: 1px solid rgba(34, 211, 238, 0.3);
      }

      .mint-info-item {
        display: flex;
        justify-content: space-between;
        margin-bottom: 0.5rem;
        color: #e2e8f0;
      }

      .mint-info-item:last-child {
        margin-bottom: 0;
        padding-top: 0.5rem;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        font-weight: 600;
      }

      .mint-info-item .value {
        color: #22d3ee;
      }

      @media (max-width: 768px) {
        .mint-container {
          grid-template-columns: 1fr;
        }

        .preview-card {
          position: static;
        }
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="brand">
        <div class="brand-badge">ML</div>
        <span class="brand-text">MLSA Cards</span>
      </div>
      <div class="nav-right">
        <a href="/home.html" class="nav-link">Home</a>
        <a href="/store.html" class="nav-link">Store</a>
        <a href="/problems.html" class="nav-link">Problems</a>
        <a href="/mint.html" class="nav-link active">Mint NFT</a>
        <span class="nav-points" id="navPoints">Points: 0</span>
        <div class="user-badge" id="userBadge">
          <span id="userAddress">0x...</span>
        </div>
      </div>
    </nav>

    <main class="container">
      <section class="section">
        <h1>Mint Your NFT</h1>
        <p style="color: #94a3b8; font-size: 1.1rem;">
          Create your unique NFT card on the blockchain
        </p>

        <div class="mint-container">
          <div class="mint-form">
            <div class="mint-info">
              <div class="mint-info-item">
                <span>Your Points:</span>
                <span class="value" id="currentPoints">0</span>
              </div>
              <div class="mint-info-item">
                <span>Required Points:</span>
                <span class="value">10</span>
              </div>
              <div class="mint-info-item">
                <span>Remaining After Mint:</span>
                <span class="value" id="remainingPoints">0</span>
              </div>
            </div>

            <form id="mintForm">
              <div class="form-group">
                <label for="nftName">NFT Name</label>
                <input
                  type="text"
                  id="nftName"
                  placeholder="e.g., MLSA Summit 2024"
                  required
                />
              </div>

              <div class="form-group">
                <label for="nftDescription">Description</label>
                <textarea
                  id="nftDescription"
                  placeholder="Describe your NFT card..."
                  required
                ></textarea>
              </div>

              <div class="form-group">
                <label for="nftImage">Image URL</label>
                <input
                  type="url"
                  id="nftImage"
                  placeholder="https://example.com/image.png"
                  required
                />
              </div>

              <div id="statusMessage"></div>

              <button type="submit" class="btn btn-primary">
                <span id="mintButtonText">🎨 Mint NFT (10 Points)</span>
              </button>
            </form>
          </div>

          <div class="preview-card">
            <h3>Live Preview</h3>
            <div class="nft-preview">
              <img
                id="previewImage"
                src=""
                alt="NFT Preview"
                onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22><rect width=%22200%22 height=%22200%22 fill=%22%231e293b%22/><text x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%2394a3b8%22 font-size=%2214%22>No Image</text></svg>'"
              />
              <h4 id="previewName">Untitled NFT</h4>
              <p id="previewDescription">No description yet...</p>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/ethers@6.8.1/dist/ethers.umd.min.js"></script>
    <script src="/auth-check.js"></script>
    <script src="/nav-update.js"></script>
    <script>
      const wallet = localStorage.getItem('mlsa_wallet');
      const token = localStorage.getItem('mlsa_token');

      // Load current points
      async function loadPoints() {
        try {
          const res = await fetch('/game/points', {
            headers: { Authorization: `Bearer ${token}` },
          });
          const data = await res.json();
          const points = data.points;

          document.getElementById('currentPoints').textContent = points;
          document.getElementById('remainingPoints').textContent = Math.max(0, points - 10);

          // Disable mint button if insufficient points
          const mintBtn = document.querySelector('#mintForm button[type="submit"]');
          if (points < 10) {
            mintBtn.disabled = true;
            mintBtn.style.opacity = '0.5';
            mintBtn.style.cursor = 'not-allowed';
            document.getElementById('mintButtonText').innerHTML = '❌ Insufficient Points (Need 10)';
          }
        } catch (err) {
          console.error('Failed to load points:', err);
        }
      }

      loadPoints();

      // Live preview updates
      document.getElementById('nftName').addEventListener('input', (e) => {
        document.getElementById('previewName').textContent = e.target.value || 'Untitled NFT';
      });

      document.getElementById('nftDescription').addEventListener('input', (e) => {
        document.getElementById('previewDescription').textContent = e.target.value || 'No description yet...';
      });

      document.getElementById('nftImage').addEventListener('input', (e) => {
        const img = document.getElementById('previewImage');
        if (e.target.value) {
          img.src = e.target.value;
        } else {
          img.src = '';
        }
      });

      // Mint form submission
      document.getElementById('mintForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const statusDiv = document.getElementById('statusMessage');
        const mintBtn = e.target.querySelector('button[type="submit"]');
        const btnText = document.getElementById('mintButtonText');

        const nftName = document.getElementById('nftName').value;
        const nftDescription = document.getElementById('nftDescription').value;
        const nftImage = document.getElementById('nftImage').value;

        // Disable button during minting
        mintBtn.disabled = true;
        btnText.innerHTML = '⏳ Minting...';
        statusDiv.innerHTML = '<div class="status-message status-info">🔄 Creating your NFT on the blockchain...</div>';

        try {
          // Step 1: Mint NFT via backend
          const mintRes = await fetch('/game/mint', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({
              name: nftName,
              description: nftDescription,
              image: nftImage,
            }),
          });

          if (!mintRes.ok) {
            const error = await mintRes.json();
            throw new Error(error.detail || 'Mint failed');
          }

          const mintData = await mintRes.json();
          console.log('Mint response:', mintData);

          // Step 2: Get provider and signer
          if (!window.ethereum) {
            throw new Error('MetaMask not found');
          }

          const provider = new ethers.BrowserProvider(window.ethereum);
          const signer = await provider.getSigner();

          // Step 3: Sign and send transaction
          statusDiv.innerHTML = '<div class="status-message status-info">✍️ Please sign the transaction in MetaMask...</div>';

          const txRequest = mintData.transaction;
          const tx = await signer.sendTransaction({
            to: txRequest.to,
            data: txRequest.data,
            gasLimit: ethers.toBigInt(txRequest.gas),
          });

          statusDiv.innerHTML = `<div class="status-message status-info">⏳ Transaction submitted: ${tx.hash}<br/>Waiting for confirmation...</div>`;

          // Step 4: Wait for confirmation
          const receipt = await tx.wait();
          console.log('Transaction receipt:', receipt);

          statusDiv.innerHTML = `<div class="status-message status-success">✅ NFT Minted Successfully!<br/>Token ID: ${mintData.tokenId}<br/>Transaction: ${tx.hash}</div>`;

          // Update points display
          await loadPoints();
          window.updateNavPoints();

          // Reset form after 3 seconds
          setTimeout(() => {
            document.getElementById('mintForm').reset();
            document.getElementById('previewName').textContent = 'Untitled NFT';
            document.getElementById('previewDescription').textContent = 'No description yet...';
            document.getElementById('previewImage').src = '';
            statusDiv.innerHTML = '';
            btnText.innerHTML = '🎨 Mint NFT (10 Points)';
            mintBtn.disabled = false;
          }, 3000);

        } catch (err) {
          console.error('Mint error:', err);
          statusDiv.innerHTML = `<div class="status-message status-error">❌ Error: ${err.message}</div>`;
          btnText.innerHTML = '🎨 Mint NFT (10 Points)';
          mintBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>

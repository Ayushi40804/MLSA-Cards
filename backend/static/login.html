<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login | MLSA Cards</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: "Inter", "Segoe UI", sans-serif;
        background: radial-gradient(circle at 20% 20%, #0b1220, #0b1323 45%, #08101d 80%);
        color: #e2e8f0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .login-card {
        background: #0f172a;
        border: 1px solid #1f2937;
        border-radius: 20px;
        padding: 40px;
        max-width: 450px;
        width: 100%;
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        text-align: center;
      }
      .brand-badge {
        width: 80px;
        height: 80px;
        margin: 0 auto 20px;
        border-radius: 20px;
        background: linear-gradient(145deg, #38bdf8, #22d3ee);
        display: grid;
        place-items: center;
        color: #0b1323;
        font-weight: 900;
        font-size: 2rem;
      }
      h1 {
        font-size: 1.8rem;
        margin-bottom: 8px;
        color: #e2e8f0;
      }
      p {
        color: #94a3b8;
        margin-bottom: 32px;
        font-size: 1rem;
      }
      button {
        width: 100%;
        border: none;
        border-radius: 12px;
        padding: 16px;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.2s ease;
        margin-bottom: 12px;
      }
      .btn-primary {
        background: linear-gradient(135deg, #22d3ee, #06b6d4);
        color: #0b1323;
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 32px rgba(34,211,238,0.4);
      }
      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }
      .status {
        margin-top: 20px;
        padding: 12px;
        border-radius: 10px;
        font-size: 0.9rem;
        font-weight: 600;
      }
      .status-error {
        background: #2f172a;
        color: #f87171;
        border: 1px solid #7f1d1d;
      }
      .status-success {
        background: #0f3c2f;
        color: #34d399;
        border: 1px solid #14532d;
      }
      .status-info {
        background: #1e293b;
        color: #94a3b8;
        border: 1px solid #334155;
      }
      .connection-info {
        margin-top: 20px;
        background: #111827;
        border: 1px solid #1f2937;
        border-radius: 12px;
        padding: 16px;
        text-align: left;
      }
      .info-row {
        display: flex;
        justify-content: space-between;
        padding: 8px 0;
        font-size: 0.9rem;
        color: #cbd5e1;
      }
      .info-row span:last-child {
        color: #38bdf8;
        font-weight: 700;
        word-break: break-all;
        max-width: 60%;
        text-align: right;
      }
      .divider {
        display: flex;
        align-items: center;
        margin: 2rem 0;
        color: #64748b;
        font-size: 0.9rem;
      }
      .divider::before,
      .divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: rgba(255, 255, 255, 0.1);
      }
      .divider::before {
        margin-right: 1rem;
      }
      .divider::after {
        margin-left: 1rem;
      }
      .btn-google {
        background: white;
        color: #1f2937;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
      }
      .btn-google:hover {
        background: #f9fafb;
        transform: translateY(-2px);
        box-shadow: 0 12px 32px rgba(0,0,0,0.2);
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <div class="brand-badge">ML</div>
      <h1>MLSA Cards</h1>
      <p>Choose your login method</p>
      
      <a href="/auth/google/login" class="btn-primary btn-google">
        <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path><path fill="none" d="M0 0h48v48H0z"></path></svg>
        Continue with Google
      </a>
      
      <div class="divider">OR</div>
      
      <button class="btn-primary" id="connectBtn">Connect MetaMask Wallet</button>
      
      <div id="connectionInfo" style="display:none;" class="connection-info">
        <div class="info-row">
          <span>Wallet:</span>
          <span id="wallet">-</span>
        </div>
        <div class="info-row">
          <span>Network:</span>
          <span id="networkName">-</span>
        </div>
      </div>
      
      <button class="btn-primary" id="signinBtn" disabled style="display:none;">Sign Message</button>
      
      <div id="status"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/ethers@6.8.1/dist/ethers.umd.min.js"></script>
    <script>
      const connectBtn = document.getElementById("connectBtn");
      const signinBtn = document.getElementById("signinBtn");
      const walletEl = document.getElementById("wallet");
      const networkNameEl = document.getElementById("networkName");
      const connectionInfoEl = document.getElementById("connectionInfo");
      const statusEl = document.getElementById("status");

      let provider, signer, wallet, currentChainId;

      const networkNames = {
        "31337": "Hardhat",
        "11155111": "Sepolia",
        "80002": "Polygon Amoy",
        "137": "Polygon",
        "1": "Ethereum",
      };

      function showStatus(message, type = "info") {
        statusEl.innerHTML = `<div class="status status-${type}">${message}</div>`;
      }

      async function connect() {
        try {
          if (!window.ethereum) {
            showStatus("❌ MetaMask not found. Please install MetaMask.", "error");
            return;
          }
          
          showStatus("🔄 Connecting...", "info");
          provider = new ethers.BrowserProvider(window.ethereum);
          const accounts = await provider.send("eth_requestAccounts", []);
          wallet = accounts[0];
          signer = await provider.getSigner();

          const network = await provider.getNetwork();
          currentChainId = network.chainId.toString();

          walletEl.textContent = `${wallet.substring(0, 6)}...${wallet.substring(38)}`;
          networkNameEl.textContent = networkNames[currentChainId] || "Unknown";
          connectionInfoEl.style.display = "block";
          signinBtn.style.display = "block";
          signinBtn.disabled = false;
          connectBtn.style.display = "none";
          
          showStatus("✅ Wallet connected! Now sign the message.", "success");
        } catch (err) {
          showStatus(`❌ Error: ${err.message}`, "error");
        }
      }

      async function signIn() {
        try {
          showStatus("🔄 Requesting nonce...", "info");
          const nonceResp = await fetch("/auth/nonce", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ wallet }),
          });
          const nonceJson = await nonceResp.json();

          showStatus("🔄 Please sign the message in MetaMask...", "info");
          const signature = await signer.signMessage(nonceJson.message);

          showStatus("🔄 Verifying signature...", "info");
          const verifyResp = await fetch("/auth/verify", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ wallet, signature }),
          });
          const verifyJson = await verifyResp.json();

          // Store auth data in localStorage
          localStorage.setItem("mlsa_token", verifyJson.token);
          localStorage.setItem("mlsa_wallet", wallet);
          localStorage.setItem("mlsa_chainId", currentChainId);

          showStatus("✅ Authentication successful! Redirecting...", "success");
          
          // Redirect to home page after 1 second
          setTimeout(() => {
            window.location.href = "/home.html";
          }, 1000);
        } catch (err) {
          showStatus(`❌ Sign-in error: ${err.message}`, "error");
        }
      }

      connectBtn.onclick = connect;
      signinBtn.onclick = signIn;

      // Check if already authenticated
      if (localStorage.getItem("mlsa_token")) {
        window.location.href = "/home.html";
      }
    </script>
  </body>
</html>
